<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Person Picker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1.5px solid #334155;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #6366f1; }
    input[type="text"]::placeholder { color: #475569; }

    button {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-add {
      background: #6366f1;
      color: #fff;
      white-space: nowrap;
    }

    .btn-add:hover:not(:disabled) { background: #4f46e5; }

    .bulk-area {
      margin-bottom: 16px;
    }

    .bulk-area textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1.5px solid #334155;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 0.875rem;
      resize: vertical;
      min-height: 72px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .bulk-area textarea:focus { border-color: #6366f1; }
    .bulk-area textarea::placeholder { color: #475569; }

    .bulk-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-bulk {
      background: #334155;
      color: #cbd5e1;
      font-size: 0.82rem;
    }

    .btn-bulk:hover:not(:disabled) { background: #475569; }

    .btn-clear-all {
      background: #450a0a;
      color: #fca5a5;
      font-size: 0.82rem;
      margin-left: auto;
    }

    .btn-clear-all:hover:not(:disabled) { background: #7f1d1d; }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .list-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .count-badge {
      background: #334155;
      color: #94a3b8;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .people-list {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1.5px solid #334155;
      margin-bottom: 24px;
    }

    .people-list:empty::after {
      content: 'No people added yet';
      display: block;
      text-align: center;
      padding: 28px;
      color: #475569;
      font-size: 0.875rem;
    }

    .people-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #1e293b;
      font-size: 0.9rem;
      transition: background 0.15s;
    }

    .people-list li:last-child { border-bottom: none; }
    .people-list li:hover { background: #0f172a; }

    .people-list li.highlight {
      background: #312e81;
      color: #c7d2fe;
      font-weight: 700;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #475569;
      font-size: 1rem;
      padding: 0 4px;
      line-height: 1;
      cursor: pointer;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: #f87171; }

    .pick-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 10px;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }

    .pick-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
    }

    .result-box {
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s;
    }

    .result-box.has-result { border-color: #6366f1; }

    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .result-name {
      font-size: 2rem;
      font-weight: 800;
      color: #818cf8;
      word-break: break-word;
    }

    .result-placeholder {
      color: #334155;
      font-size: 0.9rem;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Random Person Picker</h1>
    <p class="subtitle">Add people, then pick one at random.</p>

    <!-- Single add -->
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Enter a name..." autocomplete="off" />
      <button class="btn-add" onclick="addPerson()">Add</button>
    </div>

    <!-- Bulk add -->
    <div class="bulk-area">
      <textarea id="bulkInput" placeholder="Paste multiple names, one per line..."></textarea>
      <div class="bulk-row">
        <button class="btn-bulk" onclick="bulkAdd()">Add all lines</button>
        <button class="btn-clear-all" onclick="clearAll()">Clear list</button>
      </div>
    </div>

    <!-- List -->
    <div class="list-header">
      <span class="list-label">People</span>
      <span class="count-badge" id="countBadge">0</span>
    </div>
    <ul class="people-list" id="peopleList"></ul>

    <!-- Pick -->
    <button class="pick-btn" id="pickBtn" onclick="pickRandom()" disabled>Pick Random Person</button>

    <!-- Result -->
    <div class="result-box" id="resultBox">
      <span class="result-placeholder">Your picked person will appear here</span>
    </div>
  </div>

  <script>
    const people = [];
    let lastPicked = -1;

    const nameInput = document.getElementById('nameInput');
    const bulkInput = document.getElementById('bulkInput');
    const peopleList = document.getElementById('peopleList');
    const countBadge = document.getElementById('countBadge');
    const pickBtn = document.getElementById('pickBtn');
    const resultBox = document.getElementById('resultBox');

    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addPerson(); });

    function addPerson() {
      const name = nameInput.value.trim();
      if (!name) return;
      if (people.includes(name)) {
        nameInput.select();
        nameInput.style.borderColor = '#f87171';
        setTimeout(() => nameInput.style.borderColor = '', 600);
        return;
      }
      people.push(name);
      nameInput.value = '';
      render();
    }

    function bulkAdd() {
      const lines = bulkInput.value.split('\n').map(l => l.trim()).filter(Boolean);
      let added = 0;
      for (const name of lines) {
        if (!people.includes(name)) { people.push(name); added++; }
      }
      bulkInput.value = '';
      render();
    }

    function removePerson(index) {
      people.splice(index, 1);
      if (lastPicked >= people.length) lastPicked = -1;
      render();
      clearResult();
    }

    function clearAll() {
      if (people.length === 0) return;
      people.length = 0;
      lastPicked = -1;
      render();
      clearResult();
    }

    function clearResult() {
      resultBox.className = 'result-box';
      resultBox.innerHTML = '<span class="result-placeholder">Your picked person will appear here</span>';
    }

    function render() {
      peopleList.innerHTML = '';
      people.forEach((name, i) => {
        const li = document.createElement('li');
        if (i === lastPicked) li.classList.add('highlight');
        li.innerHTML = `<span>${escapeHtml(name)}</span>
          <button class="remove-btn" title="Remove" onclick="removePerson(${i})">✕</button>`;
        peopleList.appendChild(li);
      });
      countBadge.textContent = people.length;
      pickBtn.disabled = people.length < 2;
    }

    function pickRandom() {
      if (people.length < 2) return;

      let picked;
      do { picked = Math.floor(Math.random() * people.length); }
      while (picked === lastPicked && people.length > 1);

      lastPicked = picked;
      render();

      // Scroll picked item into view
      const items = peopleList.querySelectorAll('li');
      if (items[picked]) items[picked].scrollIntoView({ block: 'nearest', behavior: 'smooth' });

      resultBox.className = 'result-box has-result';
      resultBox.innerHTML = `
        <div class="result-label">Selected</div>
        <div class="result-name">${escapeHtml(people[picked])}</div>`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
